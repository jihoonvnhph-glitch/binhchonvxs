<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXS NVXS System - Bee Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .active-tab { background: #1e293b; color: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div id="app">
        <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center animate-in zoom-in-95">
                <i data-lucide="shield-check" class="w-12 h-12 text-blue-600 mx-auto mb-6"></i>
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-8 italic">Xác thực VXS</h2>
                <div id="loginStep1" class="space-y-4">
                    <select id="selUser" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none"></select>
                    <button onclick="toStep2()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs">Tiếp theo</button>
                </div>
                <div id="loginStep2" class="hidden space-y-4">
                    <input type="password" id="otp" placeholder="MÃ OTP (BEE2026)" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-black text-center text-xl tracking-[0.4em] outline-none">
                    <button onclick="toStep3()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs">Xác nhận mã</button>
                </div>
                <div id="loginStep3" class="hidden space-y-4">
                    <select id="selQuy" class="w-full p-4 rounded-2xl bg-amber-50 border-2 border-amber-200 font-black text-amber-700 outline-none">
                        <option value="Q1-2026">QUÝ 1 - 2026</option><option value="Q2-2026">QUÝ 2 - 2026</option>
                    </select>
                    <button onclick="finalLogin()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest text-xs">Vào hệ thống</button>
                </div>
            </div>
        </div>

        <div id="mainPage" class="hidden animate-in fade-in">
            <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
                <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="award" class="text-blue-600"></i>
                        <span id="headerUser" class="text-[10px] font-black uppercase tracking-widest text-slate-500"></span>
                    </div>
                    <nav class="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                        <button onclick="showTab('nom')" id="btn-nom" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all active-tab">Đề cử</button>
                        <button onclick="showTab('vote')" id="btn-vote" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Chấm điểm</button>
                        <button onclick="showTab('res')" id="btn-res" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Kết quả</button>
                    </nav>
                </div>
            </header>

            <main class="max-w-5xl mx-auto px-4 py-8">
                <div id="adminDash" class="hidden mb-10 bg-slate-900 rounded-[3rem] p-8 text-white shadow-2xl space-y-6">
                    <h3 class="flex items-center gap-2 font-black uppercase text-sm italic border-b border-white/10 pb-4"><i data-lucide="layout-dashboard" class="text-blue-400"></i> Quản trị vận hành</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-xs">
                        <div class="bg-white/5 p-5 rounded-3xl space-y-3">
                            <p class="font-bold text-blue-400 uppercase tracking-widest">Thời hạn Đề cử</p>
                            <div class="flex gap-2"><input type="date" id="nS" class="bg-transparent border border-white/20 p-2 rounded-lg w-full"><input type="date" id="nE" class="bg-transparent border border-white/20 p-2 rounded-lg w-full"></div>
                        </div>
                        <div class="bg-white/5 p-5 rounded-3xl space-y-3">
                            <p class="font-bold text-amber-400 uppercase tracking-widest">Thời hạn Chấm điểm</p>
                            <div class="flex gap-2"><input type="date" id="vS" class="bg-transparent border border-white/20 p-2 rounded-lg w-full"><input type="date" id="vE" class="bg-transparent border border-white/20 p-2 rounded-lg w-full"></div>
                        </div>
                    </div>
                    <button onclick="saveST()" class="w-full py-3 bg-blue-600 rounded-2xl font-black uppercase text-[10px]">Lưu Timeline Quý</button>
                </div>

                <div class="mb-8 p-6 bg-white border rounded-[2rem] shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Trạng thái đề cử bộ phận:</p>
                    <div id="deptStatus" class="grid grid-cols-2 md:grid-cols-4 gap-2 text-[8px] font-black uppercase"></div>
                </div>

                <div id="sec-nom" class="tab-content space-y-6"></div>
                <div id="sec-vote" class="tab-content hidden space-y-6"></div>
                <div id="sec-res" class="tab-content hidden space-y-6 text-center italic text-slate-400 py-20 uppercase font-black tracking-widest">Kết quả đang được bảo mật</div>
            </main>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://uebltcfcikgtxcgxdsbk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlYmx0Y2ZjaWtndHhjZ3hkc2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjUwMjIsImV4cCI6MjA5MTAwMTAyMn0.rymHn3x9-nhem6_NM2ZP2WObe6XLV8G70BHvQnFbQUI';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const DEPS = [
            { id: 'LOG', name: 'LOGISTICS', n: 2, tbp: 'Đỗ Ngọc Trường' },
            { id: 'TRU', name: 'TRUCKING', n: 2, tbp: 'Lê Văn Thảo' },
            { id: 'CSX', name: 'CONSOL XUẤT', n: 1, tbp: 'Phạm Thuỳ Linh' },
            { id: 'KAC', name: 'KEY ACCOUNT', n: 1, tbp: 'Phạm Thuỳ Linh' },
            { id: 'HNH', name: 'HÀNG NHẬP', n: 1, tbp: 'Phạm Thị Lan Hương' },
            { id: 'CSN', name: 'CONSOL NHẬP', n: 1, tbp: 'Trần Ngọc Trâm' },
            { id: 'HXT', name: 'HÀNG XUẤT', n: 1, tbp: 'Nguyễn Thị Phương' },
            { id: 'AXT', name: 'AIR XUẤT', n: 1, tbp: 'Nguyễn Thị Quỳnh' },
            { id: 'PRO', name: 'DỰ ÁN/RU', n: 1, tbp: 'Lê Minh Lai' },
            { id: 'KTO', name: 'KẾ TOÁN', n: 1, tbp: 'Trần Thị Quyên' },
            { id: 'VTH', name: 'VP THANH HÓA/NGHỆ AN', n: 1, tbp: 'Lê Thị Thuý' },
            { id: 'VHN', name: 'VP NAM ĐỊNH/HÀ NAM', n: 1, tbp: 'Nguyễn Thị Oanh' },
            { id: 'SAL', name: 'KINH DOANH', n: 0, tbp: 'Trần Văn Minh' },
            { id: 'ADM', name: 'VẬN HÀNH - TESTING', n: 0, tbp: 'Bùi Việt Anh', adm: true }
        ];

        let cur = null; let st = {}; let allNom = [];

        window.onload = () => {
            const s = document.getElementById('selUser');
            DEPS.forEach(d => s.innerHTML += `<option value="${d.tbp}">${d.tbp} (${d.name})</option>`);
            lucide.createIcons();
        };

        function toStep2() { document.getElementById('loginStep1').classList.add('hidden'); document.getElementById('loginStep2').classList.remove('hidden'); }
        function toStep3() { if(document.getElementById('otp').value !== 'BEE2026') return alert('Mã sai!'); document.getElementById('loginStep2').classList.add('hidden'); document.getElementById('loginStep3').classList.remove('hidden'); }

        async function finalLogin() {
            const tbp = document.getElementById('selUser').value;
            cur = DEPS.find(d => d.tbp === tbp);
            cur.quy = document.getElementById('selQuy').value;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('headerUser').innerText = `${cur.tbp} | ${cur.quy}`;
            if(cur.adm) document.getElementById('adminDash').classList.remove('hidden');
            await init();
        }

        async function init() {
            const { data: sData } = await sb.from('settings').select('*').eq('quy', cur.quy).single();
            if(sData) {
                st = sData.data;
                document.getElementById('nS').value = st.nS; document.getElementById('nE').value = st.nE;
                document.getElementById('vS').value = st.vS; document.getElementById('vE').value = st.vE;
            }
            await refreshData();
        }

        async function refreshData() {
            const { data: nData } = await sb.from('danh_sach_de_cu').select('*').eq('quy', cur.quy);
            allNom = nData || [];
            updateDeptStatus();
            if(document.getElementById('sec-nom').classList.contains('hidden') === false) renderNom();
        }

        function updateDeptStatus() {
            const container = document.getElementById('deptStatus');
            container.innerHTML = '';
            DEPS.filter(d => d.n > 0).forEach(d => {
                const isOK = allNom.some(n => n.dept_id === d.id);
                container.innerHTML += `<div class="p-2 rounded-xl border flex items-center gap-2 ${isOK ? 'bg-emerald-50 border-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300'}">
                    <i data-lucide="${isOK ? 'check-circle' : 'circle'}" class="w-3 h-3"></i> ${d.name}</div>`;
            });
            lucide.createIcons();
        }

        async function saveST() {
            const data = { nS: document.getElementById('nS').value, nE: document.getElementById('nE').value, vS: document.getElementById('vS').value, vE: document.getElementById('vE').value };
            await sb.from('settings').upsert({ quy: cur.quy, data });
            alert('Đã lưu Timeline!'); st = data;
        }

        function renderNom() {
            const cont = document.getElementById('sec-nom');
            if(cur.n === 0) { cont.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center text-slate-400 font-bold text-xs uppercase italic">Bộ phận không có chỉ tiêu đề cử quý này</div>`; return; }
            
            const existing = allNom.find(n => n.dept_id === cur.id);
            const list = existing?.staff || Array(cur.n).fill({ name: '', pos: '', com: '' });

            let html = `<div class="bg-white p-10 rounded-[3rem] shadow-sm space-y-6">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black uppercase italic tracking-tighter">Đề cử của ${cur.name}</h2>
                ${existing ? `<button onclick="delNom()" class="text-red-500 font-black text-[9px] uppercase underline">Hủy đề cử</button>` : ''}</div>`;
            
            list.forEach((s, i) => {
                html += `<div class="p-6 bg-slate-50 rounded-3xl space-y-3 relative border-2 border-white">
                    <span class="absolute -top-3 left-6 bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded-full uppercase">Đề cử ${i+1}</span>
                    <input type="text" id="n-${i}" placeholder="HỌ VÀ TÊN" value="${s.name}" class="w-full p-3 rounded-xl border font-black uppercase text-sm outline-none">
                    <textarea id="c-${i}" placeholder="Thành tích tiêu biểu..." class="w-full p-3 rounded-xl border text-xs font-medium outline-none h-20">${s.com}</textarea>
                </div>`;
            });

            html += `<button onclick="saveNom(${cur.n})" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-blue-100">${existing ? 'Cập nhật đề cử' : 'Gửi đề cử chính thức'}</button></div>`;
            cont.innerHTML = html;
        }

        async function saveNom(count) {
            const staff = [];
            for(let i=0; i<count; i++) { 
                const name = document.getElementById(`n-${i}`).value.toUpperCase();
                if(!name) return alert('Nhập tên nhân viên cậu ơi!');
                staff.push({ name, com: document.getElementById(`c-${i}`).value });
            }
            await sb.from('danh_sach_de_cu').upsert({ dept_id: cur.id, dept_name: cur.name, staff, quy: cur.quy, submitted_by: cur.tbp }, { onConflict: 'dept_id, quy' });
            alert('Thành công!'); refreshData();
        }

        async function delNom() { if(!confirm('Hủy đề cử bộ phận này?')) return; await sb.from('danh_sach_de_cu').delete().eq('dept_id', cur.id).eq('quy', cur.quy); alert('Đã xóa!'); refreshData(); }

        async function renderVote() {
            const cont = document.getElementById('sec-vote');
            if(cur.adm) { cont.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center text-slate-400 font-bold text-xs uppercase italic">Admin không tham gia chấm điểm</div>`; return; }

            const nominees = allNom.filter(n => n.dept_id !== cur.id).flatMap(n => n.staff.map(s => ({...s, dept: n.dept_name})));
            if(nominees.length === 0) { cont.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center text-slate-400 font-bold text-xs uppercase italic">Đang chờ các bộ phận nộp đề cử...</div>`; return; }

            const { data: vData } = await sb.from('danh_sach_binh_chon').select('*').eq('voter_email', cur.tbp).eq('quy', cur.quy).single();
            const max = nominees.length;

            let html = `<div class="bg-white p-10 rounded-[3rem] shadow-sm space-y-6 animate-in slide-in-from-bottom-4">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black uppercase italic tracking-tighter">Bình chọn kín</h2>
                <span class="bg-blue-600 text-white text-[9px] font-black px-4 py-2 rounded-2xl uppercase tracking-widest">Thang điểm: 1 → ${max}</span></div>
                <p class="text-[9px] font-bold text-slate-400 italic">Lưu ý: 1 điểm là thấp nhất, ${max} điểm là cao nhất. Không chấm trùng điểm.</p>
                <div class="space-y-3">`;

            nominees.forEach((n, i) => {
                html += `<div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between group hover:bg-white hover:shadow-md transition-all border border-transparent hover:border-blue-50">
                    <div><h4 class="font-black text-slate-800 uppercase text-xs tracking-tighter">${n.name}</h4><p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">${n.dept}</p></div>
                    <select id="v-${i}" class="w-16 p-2 bg-white rounded-xl border font-black text-blue-600 text-center outline-none">
                        <option value="">--</option>${Array.from({length: max}).map((_, idx) => `<option value="${idx+1}" ${vData?.scores[n.name] == idx+1 ? 'selected' : ''}>${idx+1}</option>`).join('')}
                    </select>
                </div>`;
            });

            html += `<button onclick="saveVote(${nominees.length})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Gửi phiếu bình chọn</button></div>`;
            cont.innerHTML = html;
        }

        async function saveVote(count) {
            const sc = {}; const vals = [];
            for(let i=0; i<count; i++) {
                const v = document.getElementById(`v-${i}`).value;
                const n = document.querySelectorAll('.tracking-tighter')[i+1].innerText; // Offset Header
                if(!v) return alert('Chấm đủ điểm cho mọi người cậu ơi!');
                sc[n] = parseInt(v); vals.push(v);
            }
            if(new Set(vals).size !== vals.length) return alert('Điểm số không được trùng nhau!');
            await sb.from('danh_sach_binh_chon').upsert({ voter_email: cur.tbp, scores: sc, quy: cur.quy }, { onConflict: 'voter_email, quy' });
            alert('Cảm ơn cậu đã hoàn thành bình chọn!');
        }

        async function renderResults() {
            const cont = document.getElementById('sec-res');
            const { data: vts } = await sb.from('danh_sach_binh_chon').select('*').eq('quy', cur.quy);
            const { data: nms } = await sb.from('danh_sach_de_cu').select('*').eq('quy', cur.quy);
            
            // Chỉ hiện khi Admin hoặc Đủ số người chấm (Ước tính 12 TBP)
            if(!cur.adm && vts.length < 12) { cont.innerHTML = `Kết quả đang được bảo mật (Tiến độ: ${vts.length}/12)`; return; }

            const resMap = {};
            nms.forEach(n => n.staff.forEach(s => resMap[s.name] = { name: s.name, dept: n.dept_name, total: 0, count: 0 }));
            vts.forEach(v => Object.entries(v.scores).forEach(([name, score]) => { if(resMap[name]) { resMap[name].total += score; resMap[name].count += 1; } }));

            const final = Object.values(resMap).map(s => ({...s, avg: s.count > 0 ? (s.total/s.count).toFixed(2) : 0})).sort((a,b) => b.avg - a.avg);

            let html = `<div class="space-y-12 animate-in fade-in duration-1000">
                <div><h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase mb-2 italic underline decoration-blue-500">Bảng vinh danh NVXS</h2><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Dựa trên ${vts.length} phiếu bình chọn trung thực</p></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-end max-w-4xl mx-auto mb-16">`;

            final.slice(0, 3).forEach((s, i) => {
                html += `<div class="relative p-10 rounded-[50px] border-4 flex flex-col items-center text-center transition-all ${i === 0 ? 'bg-gradient-to-b from-amber-50 to-white border-amber-400 scale-105 shadow-2xl z-10' : 'bg-white border-slate-100 shadow-xl opacity-90 h-[90%]'}">
                    <div class="absolute top-6 right-6 px-3 py-1 text-white rounded-full text-[10px] font-black uppercase ${i === 0 ? 'bg-amber-400' : 'bg-slate-900'}">TOP ${i+1}</div>
                    <h3 class="text-2xl font-black text-slate-800 mb-1 uppercase tracking-tighter italic">${s.name}</h3>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">${s.dept}</p>
                    <div class="text-6xl text-blue-600 font-black tracking-tighter leading-none">${s.avg}</div>
                </div>`;
            });

            html += `</div><div class="bg-white rounded-[3rem] border shadow-sm overflow-hidden text-[10px] uppercase font-bold"><table class="w-full text-left">
                <thead class="bg-slate-900 text-white"><tr class="p-4 italic"> <th class="p-6">Hạng</th><th class="p-6">Nhân sự</th><th class="p-6">Trung bình</th> </tr></thead>
                <tbody class="divide-y">${final.map((s, i) => `<tr class="hover:bg-slate-50 transition-colors"><td class="p-6 text-slate-300">#${i+1}</td><td class="p-6 font-black">${s.name}<br><span class="text-[8px] text-slate-400 font-bold">${s.dept}</span></td><td class="p-6 text-blue-600 font-black text-lg">${s.avg}</td></tr>`).join('')}</tbody>
            </table></div></div>`;
            cont.innerHTML = html;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
            if(tab === 'nom') renderNom(); if(tab === 'vote') renderVote(); if(tab === 'res') renderResults();
            lucide.createIcons();
        }
    </script>
</body>
</html>
