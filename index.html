<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXS NVXS System - Bee Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-tab { background: #1e293b; color: white; font-weight: 900; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">

    <div id="app">
        <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center">
                <div id="loginStep1" class="space-y-6">
                    <h2 class="text-2xl font-black text-slate-800 uppercase italic mb-8 italic">Xác thực VXS</h2>
                    <select id="selUser" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none"></select>
                    <button onclick="sendMailOTP()" id="btnSend" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg">Gửi mã vào Mail</button>
                </div>
                <div id="loginStep2" class="hidden space-y-6">
                    <input type="text" id="otp" placeholder="0 0 0 0 0 0" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-black text-center text-3xl tracking-[0.4em]">
                    <button onclick="verifyOTP()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg">Xác nhận</button>
                </div>
            </div>
        </div>

        <div id="quarterPage" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-900">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center border-t-8 border-amber-400">
                <i data-lucide="calendar" class="w-12 h-12 text-amber-500 mx-auto mb-6"></i>
                <h2 class="text-xl font-black text-slate-800 uppercase mb-8 italic">Chọn kỳ làm việc</h2>
                <select id="selQuy" class="w-full p-4 rounded-2xl bg-amber-50 border-2 border-amber-200 font-black text-amber-700 mb-6 outline-none">
                    <option value="Q1-2026">QUÝ 1 - 2026</option><option value="Q2-2026">QUÝ 2 - 2026</option>
                </select>
                <button onclick="enterSystem()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Vào hệ tokens</button>
            </div>
        </div>

        <div id="mainPage" class="hidden animate-in fade-in">
            <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
                <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="award" class="text-blue-600 w-5 h-5"></i>
                        <span id="headerUser" class="text-[9px] font-black uppercase tracking-widest text-slate-500"></span>
                    </div>
                    <nav class="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                        <button onclick="switchTab('nom')" id="btn-nom" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all active-tab">Đề cử</button>
                        <button onclick="switchTab('vote')" id="btn-vote" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Chấm điểm</button>
                        <button onclick="switchTab('res')" id="btn-res" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Kết quả</button>
                    </nav>
                </div>
            </header>

            <main class="max-w-5xl mx-auto px-4 py-8">
                <div class="mb-8 p-6 bg-white border rounded-[2rem] shadow-sm overflow-hidden">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-4">Tiến độ đề cử 12 bộ phận:</p>
                    <div id="statusBar" class="grid grid-cols-2 md:grid-cols-6 gap-2"></div>
                </div>

                <div id="adminDash" class="hidden mb-10 bg-slate-900 rounded-[3rem] p-8 text-white shadow-2xl">
                    <h3 class="font-black uppercase text-xs italic mb-6 text-blue-400 flex items-center gap-2"><i data-lucide="shield-check"></i> Admin Control Center</h3>
                    <div id="adminStats" class="grid grid-cols-1 md:grid-cols-3 gap-4 text-[10px] font-black uppercase">
                        </div>
                </div>

                <div id="sec-nom" class="tab-content space-y-6"></div>
                <div id="sec-vote" class="tab-content hidden space-y-6"></div>
                <div id="sec-res" class="tab-content hidden space-y-6 text-center italic text-slate-400 py-20 uppercase font-black tracking-widest">Kết quả đang được bảo mật</div>
            </main>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://uebltcfcikgtxcgxdsbk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlYmx0Y2ZjaWtndHhjZ3hkc2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjUwMjIsImV4cCI6MjA5MTAwMTAyMn0.rymHn3x9-nhem6_NM2ZP2WObe6XLV8G70BHvQnFbQUI';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const DEPS = [
            { id: 'LOG', name: 'LOGISTICS', n: 2, tbp: 'Đỗ Ngọc Trường', email: 'edgar.vnhph@beelogistics.com' },
            { id: 'TRU', name: 'TRUCKING', n: 2, tbp: 'Lê Văn Thảo', email: 'thaolv@beelogistics.com' },
            { id: 'CSX', name: 'CONSOL XUẤT', n: 1, tbp: 'Phạm Thuỳ Linh', email: 'linhpt@beelogistics.com' },
            { id: 'HNH', name: 'HÀNG NHẬP', n: 1, tbp: 'Phạm Thị Lan Hương', email: 'huongptl@beelogistics.com' },
            { id: 'CSN', name: 'CONSOL NHẬP', n: 1, tbp: 'Trần Ngọc Trâm', email: 'Charmie.vnhph@beelogistics.com' },
            { id: 'HXT', name: 'HÀNG XUẤT', n: 1, tbp: 'Nguyễn Thị Phương', email: 'Shirley.vnhph@beelogistics.com' },
            { id: 'AXT', name: 'AIR XUẤT', n: 1, tbp: 'Nguyễn Thị Quỳnh', email: 'quynhnt@beelogistics.com' },
            { id: 'PRO', name: 'DỰ ÁN/RU', n: 1, tbp: 'Lê Minh Lai', email: 'Lailm@beelogistics.com' },
            { id: 'KTO', name: 'KẾ TOÁN', n: 1, tbp: 'Trần Thị Quyên', email: 'quyentt@beelogistics.com' },
            { id: 'VTH', name: 'VP THANH HÓA/NGHỆ AN', n: 1, tbp: 'Lê Thị Thuý', email: 'Ltthuy@beelogistics.com' },
            { id: 'VHN', name: 'VP NAM ĐỊNH/HÀ NAM', n: 1, tbp: 'Nguyễn Thị Oanh', email: 'oanhnt@beelogistics.com' },
            { id: 'SAL', name: 'KINH DOANH', n: 0, tbp: 'Trần Văn Minh', email: 'minhtv@beelogistics.com' },
            { id: 'ADM', name: 'VẬN HÀNH - TESTING', n: 0, tbp: 'Bùi Việt Anh', email: 'Jihoon.vnhph@beelogistics.com', adm: true }
        ];

        let cur = null; let allNom = []; let allVotes = [];

        window.onload = () => {
            const s = document.getElementById('selUser');
            DEPS.forEach(d => s.innerHTML += `<option value="${d.tbp}">${d.tbp} (${d.name})</option>`);
            lucide.createIcons();
        };

        async function sendMailOTP() {
            cur = DEPS.find(d => d.tbp === document.getElementById('selUser').value);
            document.getElementById('btnSend').innerText = "Đang gửi...";
            const { error } = await sb.auth.signInWithOtp({ email: cur.email });
            if(error) alert(error.message);
            else { document.getElementById('loginStep1').classList.add('hidden'); document.getElementById('loginStep2').classList.remove('hidden'); }
        }

        async function verifyOTP() {
            const { error } = await sb.auth.verifyOtp({ email: cur.email, token: document.getElementById('otp').value, type: 'magiclink' });
            if(error) alert("Mã sai!");
            else { document.getElementById('loginPage').classList.add('hidden'); document.getElementById('quarterPage').classList.remove('hidden'); }
        }

        async function enterSystem() {
            cur.quy = document.getElementById('selQuy').value;
            document.getElementById('quarterPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('headerUser').innerText = `${cur.tbp} | ${cur.quy}`;
            if(cur.adm) document.getElementById('adminDash').classList.remove('hidden');
            await refreshData();
            switchTab('nom');
            lucide.createIcons();
        }

        async function refreshData() {
            const { data: nData } = await sb.from('danh_sach_de_cu').select('*').eq('quy', cur.quy);
            const { data: vData } = await sb.from('danh_sach_binh_chon').select('*').eq('quy', cur.quy);
            allNom = nData || [];
            allVotes = vData || [];
            renderStatusBar();
            if(cur.adm) renderAdminDash();
        }

        function renderStatusBar() {
            const bar = document.getElementById('statusBar'); bar.innerHTML = '';
            DEPS.filter(d => d.n > 0).forEach(d => {
                const ok = allNom.some(n => n.dept_id === d.id);
                bar.innerHTML += `<div class="flex items-center gap-2 p-2 rounded-xl border ${ok ? 'bg-emerald-50 border-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300'} text-[8px] font-black uppercase">
                    <i data-lucide="${ok ? 'check-circle' : 'circle'}" class="w-3 h-3"></i> ${d.name}</div>`;
            });
            lucide.createIcons();
        }

        function renderAdminDash() {
            const cont = document.getElementById('adminStats');
            const totalNom = allNom.reduce((sum, item) => sum + item.staff.length, 0);
            const totalVoters = DEPS.filter(d => d.tbp !== 'Bùi Việt Anh').length;
            cont.innerHTML = `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10"><p class="text-slate-400 mb-1">Tổng nhân sự đề cử</p><p class="text-xl text-blue-400">${totalNom} / 14</p></div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10"><p class="text-slate-400 mb-1">TBP đã chấm điểm</p><p class="text-xl text-emerald-400">${allVotes.length} / ${totalVoters}</p></div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10"><p class="text-slate-400 mb-1">Trạng thái kỳ</p><p class="text-xl text-amber-400">${cur.quy}</p></div>
            `;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`sec-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
            if(tab === 'nom') renderNom();
            if(tab === 'vote') renderVote();
            if(tab === 'res') renderResults();
            lucide.createIcons();
        }

        function compressImg(file, callback) {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 200; canvas.height = 200;
                    ctx.drawImage(img, 0, 0, 200, 200);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
            }
        }

        async function renderNom() {
            const cont = document.getElementById('sec-nom');
            if(cur.n === 0) { cont.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center text-slate-400 font-bold text-[10px] uppercase italic">Bộ phận không có chỉ tiêu đề cử</div>`; return; }
            
            const existing = allNom.find(n => n.dept_id === cur.id);
            const list = existing?.staff || Array(cur.n).fill({ name: '', pos: '', com: '', img: '' });

            let html = `<div class="bg-white p-10 rounded-[3rem] shadow-sm space-y-6"><h2 class="text-xl font-black uppercase italic border-b pb-4">Form Đề cử ${cur.name}</h2>`;
            list.forEach((s, i) => {
                html += `<div class="p-6 bg-slate-50 rounded-3xl space-y-4 border-2 border-white shadow-inner relative">
                    <span class="absolute -top-3 left-6 bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded-full uppercase italic">Suất ${i+1}</span>
                    <div class="flex gap-4">
                        <div class="w-20 h-20 bg-white border rounded-2xl flex items-center justify-center overflow-hidden shrink-0 relative cursor-pointer" onclick="document.getElementById('file-${i}').click()">
                            ${s.img ? `<img src="${s.img}" class="w-full h-full object-cover">` : `<i data-lucide="camera" class="text-slate-300"></i>`}
                            <input type="file" id="file-${i}" class="hidden" onchange="handleImg(this, ${i})">
                        </div>
                        <div class="w-full space-y-2">
                            <input type="text" id="n-${i}" placeholder="HỌ VÀ TÊN (VIẾT HOA)" value="${s.name}" oninput="this.value=this.value.toUpperCase()" class="w-full p-3 rounded-xl border font-black text-sm uppercase outline-none focus:ring-2 focus:ring-blue-500">
                            <input type="text" id="p-${i}" placeholder="Chức danh" value="${s.pos}" class="w-full p-3 rounded-xl border text-xs font-bold outline-none">
                        </div>
                    </div>
                    <textarea id="c-${i}" placeholder="Mô tả thành tích/điểm mạnh..." class="w-full p-3 rounded-xl border text-xs h-20 outline-none">${s.com}</textarea>
                    <input type="hidden" id="img-${i}" value="${s.img || ''}">
                </div>`;
            });
            html += `<button onclick="saveNom(${cur.n})" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Gửi đề cử chính thức</button></div>`;
            cont.innerHTML = html;
            lucide.createIcons();
        }

        window.handleImg = (input, i) => {
            if(input.files[0]) compressImg(input.files[0], base64 => {
                document.getElementById(`img-${i}`).value = base64;
                input.parentElement.innerHTML = `<img src="${base64}" class="w-full h-full object-cover"><input type="file" id="file-${i}" class="hidden" onchange="handleImg(this, ${i})">`;
            });
        }

        async function saveNom(count) {
            const staff = [];
            for(let i=0; i<count; i++) {
                const name = document.getElementById(`n-${i}`).value;
                if(!name) return alert("Vui lòng nhập tên!");
                staff.push({ name, pos: document.getElementById(`p-${i}`).value, com: document.getElementById(`c-${i}`).value, img: document.getElementById(`img-${i}`).value });
            }
            await sb.from('danh_sach_de_cu').upsert({ dept_id: cur.id, dept_name: cur.name, staff, quy: cur.quy, submitted_by: cur.tbp }, { onConflict: 'dept_id, quy' });
            alert("Đã cập nhật!"); refreshData();
        }

        async function renderVote() {
            const cont = document.getElementById('sec-vote');
            const nominees = allNom.filter(n => n.dept_id !== cur.id).flatMap(n => n.staff.map(s => ({...s, dept: n.dept_name})));
            const max = nominees.length;
            if(max === 0) { cont.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center text-slate-400 font-bold text-[10px] uppercase italic">Đang chờ đề cử...</div>`; return; }

            const { data: vData } = await sb.from('danh_sach_binh_chon').select('*').eq('voter_email', cur.tbp).eq('quy', cur.quy).single();
            
            let html = `<div class="bg-white p-10 rounded-[3rem] shadow-sm space-y-6">
                <div class="flex justify-between items-center"><h2 class="text-xl font-black uppercase italic italic border-b pb-4">Bình chọn kín</h2>
                <span class="bg-blue-600 text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">Thang 1 → ${max}</span></div>
                <div class="space-y-3">`;
            nominees.forEach((n, i) => {
                html += `<div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between border hover:border-blue-100 transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-white overflow-hidden border">
                            ${n.img ? `<img src="${n.img}" class="w-full h-full object-cover">` : `<i data-lucide="user" class="p-2 text-slate-200"></i>`}
                        </div>
                        <div><h4 class="font-black text-slate-800 uppercase text-xs tracking-tighter">${n.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase">${n.dept}</p></div>
                    </div>
                    <select id="v-${i}" class="w-16 p-2 bg-white rounded-xl border font-black text-blue-600 outline-none">
                        <option value="">--</option>${Array.from({length: max}).map((_, idx) => `<option value="${idx+1}" ${vData?.scores[n.name] == idx+1 ? 'selected' : ''}>${idx+1}</option>`).join('')}
                    </select>
                </div>`;
            });
            html += `<button onclick="saveVote(${nominees.length})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Xác nhận kết quả</button></div>`;
            cont.innerHTML = html;
            lucide.createIcons();
        }

        async function saveVote(count) {
            const sc = {}; const vals = [];
            for(let i=0; i<count; i++) {
                const v = document.getElementById(`v-${i}`).value;
                const n = document.querySelectorAll('#sec-vote h4')[i].innerText;
                if(!v) return alert('Chấm đủ điểm cậu ơi!');
                sc[n] = parseInt(v); vals.push(v);
            }
            if(new Set(vals).size !== vals.length) return alert('Điểm số không được trùng nhau!');
            await sb.from('danh_sach_binh_chon').upsert({ voter_email: cur.tbp, scores: sc, quy: cur.quy }, { onConflict: 'voter_email, quy' });
            alert('Đã ghi nhận!'); refreshData();
        }

        async function renderResults() {
            const cont = document.getElementById('sec-res');
            if(!cur.adm && allVotes.length < 12) { cont.innerHTML = `<div class="bg-white p-10 rounded-[3rem] text-center text-slate-400 font-bold text-[10px] uppercase italic">Kết quả bảo mật (Tiến độ: ${allVotes.length}/12 TBP)</div>`; return; }

            const resMap = {};
            allNom.forEach(n => n.staff.forEach(s => resMap[s.name] = { name: s.name, dept: n.dept_name, pos: s.pos, img: s.img, total: 0, count: 0 }));
            allVotes.forEach(v => Object.entries(v.scores).forEach(([name, score]) => { if(resMap[name]) { resMap[name].total += score; resMap[name].count += 1; } }));
            const final = Object.values(resMap).map(s => ({...s, avg: s.count > 0 ? (s.total/s.count).toFixed(2) : 0})).sort((a,b) => b.avg - a.avg);

            let html = `<div class="space-y-12 animate-in fade-in duration-1000">
                <h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase italic underline decoration-blue-500">Bảng vàng NVXS</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-end max-w-4xl mx-auto">`;
            final.slice(0, 3).forEach((s, i) => {
                html += `<div class="relative p-10 rounded-[50px] border-4 flex flex-col items-center transition-all ${i === 0 ? 'bg-amber-50 border-amber-400 scale-105 shadow-2xl z-10' : 'bg-white border-slate-100 shadow-xl opacity-90 h-[90%]'}">
                    <div class="w-24 h-24 rounded-[32px] overflow-hidden border-4 border-white shadow-xl mb-6">
                        ${s.img ? `<img src="${s.img}" class="w-full h-full object-cover">` : `<div class="bg-slate-50 w-full h-full"></div>`}
                    </div>
                    <span class="absolute top-6 right-6 px-3 py-1 text-white rounded-full text-[8px] font-black uppercase ${i === 0 ? 'bg-amber-400' : 'bg-slate-900'}">TOP ${i+1}</span>
                    <h3 class="text-2xl font-black text-slate-800 uppercase italic tracking-tighter">${s.name}</h3>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${s.dept}</p>
                    <div class="text-6xl text-blue-600 font-black tracking-tighter leading-none mt-6">${s.avg}</div>
                </div>`;
            });
            html += `</div><div class="bg-white rounded-[3rem] border shadow-sm overflow-hidden text-[9px] uppercase font-bold"><table class="w-full text-left">
                <thead class="bg-slate-900 text-white"><tr class="italic"><th class="p-6">Hạng</th><th class="p-6">Nhân sự</th><th class="p-6">Trung bình</th></tr></thead>
                <tbody class="divide-y">${final.map((s, i) => `<tr class="hover:bg-slate-50 transition-colors"><td class="p-6 text-slate-300">#${i+1}</td><td class="p-6 font-black">${s.name}<br><span class="text-[8px] text-slate-400 font-bold italic">${s.dept} • ${s.pos}</span></td><td class="p-6 text-blue-600 font-black text-xl">${s.avg}</td></tr>`).join('')}</tbody>
            </table></div></div>`;
            cont.innerHTML = html;
        }
    </script>
</body>
</html>
