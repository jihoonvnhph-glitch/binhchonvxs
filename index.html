<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Bình chọn VXS - Bee Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bee-blue: #004a99; --bee-yellow: #ffcb05; }
        body { background-color: #f4f7f9; font-family: sans-serif; }
        .btn-bee { background-color: var(--bee-blue); color: white; transition: 0.3s; }
        .btn-bee:hover { background-color: #003366; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden border-t-4 border-[#ffcb05]">
        <div class="p-6">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-[#004a99]">BÌNH CHỌN VXS</h1>
                <p class="text-gray-500 text-sm">Vận hành - Điều phối - Logistics</p>
            </div>

            <form id="votingForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Chọn Quý bình chọn</label>
                    <select id="quy" class="w-full mt-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-[#004a99]">
                        <option value="Q1-2026">Quý 1 - 2026</option>
                        <option value="Q2-2026">Quý 2 - 2026</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">Người được đề cử</label>
                    <select id="nguoiDuocDeCu" class="w-full mt-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-[#004a99]">
                        <option value="">-- Chọn đồng nghiệp --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">Lý do đề cử (Súc tích)</label>
                    <textarea id="lyDo" rows="3" class="w-full mt-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-[#004a99]" placeholder="Điểm mạnh nổi bật trong quý..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">Email của cậu (Để xác thực)</label>
                    <input type="email" id="emailNguoiGui" class="w-full mt-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-[#004a99]" placeholder="example@beelogistics.com">
                </div>

                <button type="submit" class="w-full btn-bee py-3 rounded-lg font-bold shadow-md">GỬI ĐỀ CỬ</button>
            </form>
            <p id="msg" class="mt-4 text-center text-sm font-medium"></p>
        </div>
    </div>

    <script>
        // Cấu hình kết nối (Sẽ lấy từ file .env sau khi lên Vercel)
        const supabaseUrl = 'https://avfncwgydjhvnlqhixxd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Thay bằng Anon Key của cậu
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Load danh sách nhân viên vào dropdown
        async function loadNhanVien() {
            const { data } = await supabase.from('danh_sach_nhan_vien').select('ho_ten');
            const select = document.getElementById('nguoiDuocDeCu');
            data.forEach(nv => {
                let opt = document.createElement('option');
                opt.value = nv.ho_ten;
                opt.innerHTML = nv.ho_ten;
                select.appendChild(opt);
            });
        }
        loadNhanVien();

        // Xử lý gửi form
        document.getElementById('votingForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.innerText = "Đang gửi...";

            const { error } = await supabase.from('danh_sach_de_cu').insert([{
                nguoi_de_cu_email: document.getElementById('emailNguoiGui').value,
                nguoi_duoc_de_cu: document.getElementById('nguoiDuocDeCu').value,
                ly_do: document.getElementById('lyDo').value,
                quy: document.getElementById('quy').value
            }]);

            if (error) {
                msg.className = "text-red-500 text-center mt-4";
                msg.innerText = "Lỗi: " + error.message;
            } else {
                msg.className = "text-green-600 text-center mt-4";
                msg.innerText = "Gửi đề cử thành công! Cảm ơn Việt Anh.";
                document.getElementById('votingForm').reset();
            }
        };
    </script>
</body>
</html>
