<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXS - Bee Logistics Voting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div id="app" class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl border-t-[12px] border-[#ffcb05] overflow-hidden">
        
        <div class="p-10 text-center bg-slate-900 text-white relative">
            <div class="flex justify-center mb-4">
                <div class="bg-[#ffcb05] p-3 rounded-2xl shadow-lg shadow-[#ffcb05]/20">
                    <i data-lucide="trophy" class="w-8 h-8 text-slate-900"></i>
                </div>
            </div>
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-tight">NVXS Quarterly<br>2026</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-2">Bee Logistics - VXS System</p>
        </div>

        <div class="p-8">
            <div id="step1" class="space-y-6 animate-in fade-in duration-500">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-center gap-3">
                    <i data-lucide="shield-check" class="text-blue-600 w-5 h-5"></i>
                    <p class="text-[11px] font-bold text-blue-800 uppercase tracking-tight">Xác thực Email Bee Logistics</p>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Email Công Ty</label>
                    <input type="email" id="emailInput" placeholder="Jihoon.vnhph@beelogistics.com" 
                           class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-600 transition-all text-sm">
                </div>
                <button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[11px] shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                    Gửi mã xác thực
                </button>
            </div>

            <div id="step2" class="hidden animate-in zoom-in duration-300 space-y-6">
                <div class="text-center">
                    <p class="text-sm font-black text-slate-700 uppercase tracking-tight">Kiểm tra hộp thư</p>
                    <p class="text-[10px] text-slate-400 font-medium mt-1">Mã 6 số đã được gửi vào mail của cậu</p>
                </div>
                <input type="text" id="otpInput" placeholder="0 0 0 0 0 0" 
                       class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-center text-3xl tracking-[0.4em] outline-none focus:border-emerald-500 transition-all">
                <button onclick="verifyOTP()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[11px] shadow-xl shadow-emerald-100">
                    Xác nhận & Đăng nhập
                </button>
                <button onclick="location.reload()" class="w-full text-[10px] font-bold text-slate-400 uppercase underline">Quay lại</button>
            </div>

            <div id="mainContent" class="hidden animate-in slide-in-from-bottom-8 duration-500 space-y-6">
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-2 text-[10px] font-black text-slate-600 uppercase">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span id="displayUser"></span>
                    </div>
                    <button onclick="location.reload()" class="text-[9px] font-black text-rose-500 uppercase bg-rose-50 px-3 py-1 rounded-full">Thoát</button>
                </div>

                <div class="bg-white space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Kỳ bình chọn</label>
                            <select id="quy" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-bold text-xs outline-none">
                                <option value="Q1-2026">Quý 1 - 2026</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Đồng nghiệp</label>
                            <select id="listNV" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl font-bold text-xs outline-none">
                                <option value="">Chọn nhân sự...</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Lý do / Thành tích tiêu biểu</label>
                        <textarea id="lyDo" rows="4" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-medium text-sm outline-none focus:border-blue-600 transition-all" placeholder="Ghi chú ngắn gọn các điểm mạnh nổi bật..."></textarea>
                    </div>
                    <button onclick="saveVote()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[11px] flex items-center justify-center gap-3 shadow-2xl hover:bg-black transition-all">
                        <i data-lucide="send" class="w-4 h-4 text-[#ffcb05]"></i> Gửi đề cử chính thức
                    </button>
                </div>

                <div id="adminArea" class="hidden mt-10 pt-8 border-t-2 border-dashed border-slate-200">
                    <div class="flex items-center gap-2 mb-4 justify-center text-rose-600 font-black uppercase tracking-tighter italic">
                        <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Bảng tổng hợp (Admin Only)
                    </div>
                    <div id="resultTable" class="text-[10px] overflow-x-auto rounded-2xl border border-slate-100 shadow-inner p-3 bg-slate-50 font-medium"></div>
                </div>
            </div>
            
            <p id="status" class="mt-8 text-center text-[10px] font-black uppercase text-slate-300 tracking-widest"></p>
        </div>
    </div>

    <script>
        // THÔNG SỐ DỰ ÁN UEBLTC CỦA VIỆT ANH
        const supabaseUrl = 'https://uebltcfcikgtxcgxdsbk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlYmx0Y2ZjaWtndHhjZ3hkc2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjUwMjIsImV4cCI6MjA5MTAwMTAyMn0.rymHn3x9-nhem6_NM2ZP2WObe6XLV8G70BHvQnFbQUI';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        // Kích hoạt Icon
        lucide.createIcons();

        async function sendOTP() {
            const email = document.getElementById('emailInput').value;
            if(!email.includes('@')) return alert("Cậu nhập thiếu @ rồi kìa!");
            
            const { error } = await client.auth.signInWithOtp({ email });
            if(error) {
                alert("Lỗi kết nối: " + error.message);
            } else {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('status').innerText = "Đang chờ xác thực...";
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('emailInput').value;
            const token = document.getElementById('otpInput').value;
            const { data, error } = await client.auth.verifyOtp({ email, token, type: 'magiclink' });
            
            if(error) {
                alert("Mã OTP không đúng hoặc đã hết hạn!");
            } else {
                loginSuccess(data.user.email);
            }
        }

        function loginSuccess(email) {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayUser').innerText = email;
            
            // Nếu là email của Việt Anh thì hiện Admin View
            if(email.toLowerCase() === 'jihoon.vnhph@beelogistics.com') {
                document.getElementById('adminArea').classList.remove('hidden');
                loadAdminData();
            }
            loadNV();
            lucide.createIcons();
        }

        async function loadNV() {
            const { data, error } = await client.from('danh_sach_nhan_vien').select('ho_ten');
            if (!error && data) {
                document.getElementById('listNV').innerHTML = data.map(n => `<option value="${n.ho_ten}">${n.ho_ten}</option>`).join('');
            } else {
                document.getElementById('listNV').innerHTML = '<option>Lỗi tải nhân viên</option>';
            }
        }

        async function saveVote() {
            const status = document.getElementById('status');
            status.innerText = "Đang gửi dữ liệu...";
            
            const { error } = await client.from('danh_sach_de_cu').insert([{
                nguoi_de_cu_email: document.getElementById('displayUser').innerText,
                nguoi_duoc_de_cu: document.getElementById('listNV').value,
                ly_do: document.getElementById('lyDo').value,
                quy: document.getElementById('quy').value
            }]);

            if(!error) { 
                alert("Đã gửi đề cử thành công!"); 
                location.reload(); 
            } else {
                alert("Lỗi khi gửi đề cử, cậu kiểm tra lại bảng danh_sach_de_cu nhé!");
            }
        }

        async function loadAdminData() {
            const { data } = await client.from('danh_sach_de_cu').select('*');
            let h = '<table class="w-full text-left border-collapse"><thead><tr class="bg-slate-200 border-b text-[8px]"> <th class="p-2">Người nhận</th><th class="p-2">Lý do đề cử</th> </tr></thead><tbody>';
            if(data && data.length > 0) {
                data.forEach(d => {
                    h += `<tr class="border-b"><td class="p-2 font-black">${d.nguoi_duoc_de_cu}</td><td class="p-2">${d.ly_do}</td></tr>`;
                });
            } else {
                h += '<tr><td colspan="2" class="p-4 text-center text-slate-400 italic">Chưa có dữ liệu đề cử nào.</td></tr>';
            }
            document.getElementById('resultTable').innerHTML = h + '</tbody></table>';
        }
    </script>
</body>
</html>
