<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXS NVXS System - Bee Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .step-transition { transition: all 0.4s ease-in-out; }
        .active-tab { background: #1e293b; color: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); font-weight: 900; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-900">

    <div id="app">
        <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900 via-slate-900 to-black">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center">
                <div class="flex justify-center mb-6">
                    <div class="bg-blue-600 p-5 rounded-[24px] shadow-xl"><i data-lucide="lock" class="w-8 h-8 text-white"></i></div>
                </div>
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-8">Xác thực BEE</h2>
                
                <div id="loginStep1" class="space-y-6 step-transition">
                    <div class="text-left space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Danh tính Anh/Chị</label>
                        <select id="selUser" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold text-slate-700 outline-none focus:border-blue-600">
                            <option value="">-- Chọn tên Anh/Chị --</option>
                        </select>
                    </div>
                    <button onclick="toStep2()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-blue-500/20 active:scale-95 transition-all">Tiếp theo</button>
                </div>

                <div id="loginStep2" class="hidden space-y-6 step-transition">
                    <div class="text-left space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Mã OTP bảo mật</label>
                        <input type="password" id="otp" placeholder="B E E 2 0 2 6" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-black text-center text-xl tracking-[0.4em] outline-none focus:border-blue-600">
                    </div>
                    <button onclick="verifyAndEnter()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-blue-500/20 active:scale-95 transition-all">Đăng nhập</button>
                    <button onclick="backToStep1()" class="text-[10px] font-bold text-slate-400 uppercase underline">Quay lại chọn tên</button>
                </div>
            </div>
        </div>

        <div id="quarterPage" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-900">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center border-t-8 border-amber-400">
                <i data-lucide="calendar" class="w-12 h-12 text-amber-500 mx-auto mb-6"></i>
                <h2 class="text-xl font-black text-slate-800 uppercase mb-2">Kỳ làm việc</h2>
                <p id="welcomeUser" class="text-xs font-bold text-blue-600 uppercase mb-8"></p>
                <div class="space-y-6">
                    <select id="selQuy" class="w-full p-4 rounded-2xl bg-amber-50 border-2 border-amber-200 font-black text-amber-700 outline-none">
                        <option value="Q1-2026">QUÝ 1 - 2026</option>
                        <option value="Q2-2026">QUÝ 2 - 2026</option>
                        <option value="Q3-2026">QUÝ 3 - 2026</option>
                        <option value="Q4-2026">QUÝ 4 - 2026</option>
                    </select>
                    <button onclick="enterSystem()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest text-xs">Vào hệ thống</button>
                </div>
            </div>
        </div>

        <div id="mainPage" class="hidden animate-in fade-in">
            <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
                <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="award" class="text-blue-600 w-5 h-5"></i>
                        <span id="headerUser" class="text-[9px] font-black uppercase tracking-widest text-slate-500"></span>
                    </div>
                    <nav class="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                        <button onclick="switchTab('nom')" id="btn-nom" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all active-tab">Đề cử</button>
                        <button onclick="switchTab('vote')" id="btn-vote" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Chấm điểm</button>
                        <button onclick="switchTab('res')" id="btn-res" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Kết quả</button>
                    </nav>
                </div>
            </header>

            <main class="max-w-5xl mx-auto px-4 py-8">
                <div id="sec-nom" class="tab-content"></div>
                <div id="sec-vote" class="tab-content hidden"></div>
                <div id="sec-res" class="tab-content hidden"></div>
            </main>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://uebltcfcikgtxcgxdsbk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlYmx0Y2ZjaWtndHhjZ3hkc2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjUwMjIsImV4cCI6MjA5MTAwMTAyMn0.rymHn3x9-nhem6_NM2ZP2WObe6XLV8G70BHvQnFbQUI';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const DEPS = [
            { id: 'LOG', name: 'LOGISTICS', n: 2, tbp: 'Đỗ Ngọc Trường' },
            { id: 'TRU', name: 'TRUCKING', n: 2, tbp: 'Lê Văn Thảo' },
            { id: 'CSX', name: 'CONSOL XUẤT', n: 1, tbp: 'Phạm Thuỳ Linh' },
            { id: 'KAC', name: 'KEY ACCOUNT', n: 1, tbp: 'Phạm Thuỳ Linh' },
            { id: 'HNH', name: 'HÀNG NHẬP', n: 1, tbp: 'Phạm Thị Lan Hương' },
            { id: 'CSN', name: 'CONSOL NHẬP', n: 1, tbp: 'Trần Ngọc Trâm' },
            { id: 'HXT', name: 'HÀNG XUẤT', n: 1, tbp: 'Nguyễn Thị Phương' },
            { id: 'AXT', name: 'AIR XUẤT', n: 1, tbp: 'Nguyễn Thị Quỳnh' },
            { id: 'PRO', name: 'DỰ ÁN/RU', n: 1, tbp: 'Lê Minh Lai' },
            { id: 'KTO', name: 'KẾ TOÁN', n: 1, tbp: 'Trần Thị Quyên' },
            { id: 'VTH', name: 'VP THANH HÓA/NGHỆ AN', n: 1, tbp: 'Lê Thị Thuý' },
            { id: 'VHN', name: 'VP NAM ĐỊNH/HÀ NAM', n: 1, tbp: 'Nguyễn Thị Oanh' },
            { id: 'SAL', name: 'KINH DOANH', n: 0, tbp: 'Trần Văn Minh' },
            { id: 'ADM', name: 'VẬN HÀNH - TESTING', n: 0, tbp: 'Bùi Việt Anh', adm: true }
        ];

        let cur = null;

        window.onload = () => {
            const s = document.getElementById('selUser');
            DEPS.forEach(d => s.innerHTML += `<option value="${d.tbp}">${d.tbp} (${d.name})</option>`);
            lucide.createIcons();
        };

        function toStep2() {
            if(!document.getElementById('selUser').value) return alert('Chọn danh tính cậu ơi!');
            document.getElementById('loginStep1').classList.add('hidden');
            document.getElementById('loginStep2').classList.remove('hidden');
        }

        function backToStep1() {
            document.getElementById('loginStep2').classList.add('hidden');
            document.getElementById('loginStep1').classList.remove('hidden');
        }

        function verifyAndEnter() {
            if(document.getElementById('otp').value !== 'BEE2026') return alert('Mã OTP không đúng!');
            cur = DEPS.find(d => d.tbp === document.getElementById('selUser').value);
            
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('quarterPage').classList.remove('hidden');
            document.getElementById('welcomeUser').innerText = `CHÀO ANH/CHỊ: ${cur.tbp}`;
            lucide.createIcons();
        }

        function enterSystem() {
            cur.quy = document.getElementById('selQuy').value;
            document.getElementById('quarterPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('headerUser').innerText = `${cur.tbp} | ${cur.quy}`;
            // Sau đó gọi các hàm init dữ liệu như bản trước...
        }
    </script>
</body>
</html>
