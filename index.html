<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXS NVXS System - Bee Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-tab { background: #1e293b; color: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); font-weight: 900; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-900">

    <div id="app">
        <div id="loginPage" class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900 via-slate-900 to-black">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center">
                <div class="flex justify-center mb-6">
                    <div class="bg-blue-600 p-5 rounded-[24px] shadow-xl"><i data-lucide="shield-check" class="w-8 h-8 text-white"></i></div>
                </div>
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-8 italic">Xác thực BEE</h2>
                
                <div id="loginStep1" class="space-y-6 animate-in slide-in-from-left-4">
                    <div class="text-left space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Chọn danh tính Anh/Chị</label>
                        <select id="selUser" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold text-slate-700 outline-none focus:border-blue-600"></select>
                    </div>
                    <button onclick="sendMailOTP()" id="btnSend" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 transition-all">Gửi mã vào Mail</button>
                </div>

                <div id="loginStep2" class="hidden space-y-6 animate-in zoom-in-95">
                    <div class="text-left space-y-1 text-center">
                        <p id="msgOTP" class="text-[10px] font-bold text-blue-600 uppercase mb-4"></p>
                        <input type="text" id="otp" placeholder="0 0 0 0 0 0" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-black text-center text-3xl tracking-[0.4em] outline-none focus:border-emerald-500">
                    </div>
                    <button onclick="verifyOTP()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 transition-all">Xác nhận đăng nhập</button>
                    <button onclick="location.reload()" class="text-[10px] font-bold text-slate-400 uppercase underline mt-4">Quay lại</button>
                </div>
            </div>
        </div>

        <div id="quarterPage" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-900">
            <div class="w-full max-w-sm bg-white rounded-[40px] p-10 shadow-2xl text-center border-t-8 border-amber-400 animate-in slide-in-from-bottom-8">
                <i data-lucide="calendar" class="w-12 h-12 text-amber-500 mx-auto mb-6"></i>
                <h2 class="text-xl font-black text-slate-800 uppercase mb-2 italic">Kỳ làm việc</h2>
                <p id="welcomeUser" class="text-[10px] font-black text-blue-600 uppercase mb-8"></p>
                <div class="space-y-6">
                    <select id="selQuy" class="w-full p-4 rounded-2xl bg-amber-50 border-2 border-amber-200 font-black text-amber-700 outline-none">
                        <option value="Q1-2026">QUÝ 1 - 2026</option><option value="Q2-2026">QUÝ 2 - 2026</option>
                    </select>
                    <button onclick="enterSystem()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest text-xs">Bắt đầu gửi đề cử</button>
                </div>
            </div>
        </div>

        <div id="mainPage" class="hidden">
            <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
                <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="award" class="text-blue-600 w-5 h-5"></i>
                        <span id="headerUser" class="text-[9px] font-black uppercase tracking-widest text-slate-500"></span>
                    </div>
                    <nav class="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                        <button onclick="switchTab('nom')" id="btn-nom" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all active-tab">Đề cử</button>
                        <button onclick="switchTab('vote')" id="btn-vote" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Chấm điểm</button>
                        <button onclick="switchTab('res')" id="btn-res" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Kết quả</button>
                    </nav>
                </div>
            </header>
            <main id="content" class="max-w-5xl mx-auto px-4 py-8">
                </main>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://uebltcfcikgtxcgxdsbk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlYmx0Y2ZjaWtndHhjZ3hkc2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MjUwMjIsImV4cCI6MjA5MTAwMTAyMn0.rymHn3x9-nhem6_NM2ZP2WObe6XLV8G70BHvQnFbQUI';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const DEPS = [
            { id: 'LOG', name: 'LOGISTICS', n: 2, tbp: 'Đỗ Ngọc Trường', email: 'edgar.vnhph@beelogistics.com' },
            { id: 'TRU', name: 'TRUCKING', n: 2, tbp: 'Lê Văn Thảo', email: 'thaolv@beelogistics.com' },
            { id: 'CSX', name: 'CONSOL XUẤT', n: 1, tbp: 'Phạm Thuỳ Linh', email: 'linhpt@beelogistics.com' },
            { id: 'HNH', name: 'HÀNG NHẬP', n: 1, tbp: 'Phạm Thị Lan Hương', email: 'huongptl@beelogistics.com' },
            { id: 'CSN', name: 'CONSOL NHẬP', n: 1, tbp: 'Trần Ngọc Trâm', email: 'Charmie.vnhph@beelogistics.com' },
            { id: 'HXT', name: 'HÀNG XUẤT', n: 1, tbp: 'Nguyễn Thị Phương', email: 'Shirley.vnhph@beelogistics.com' },
            { id: 'AXT', name: 'AIR XUẤT', n: 1, tbp: 'Nguyễn Thị Quỳnh', email: 'quynhnt@beelogistics.com' },
            { id: 'PRO', name: 'DỰ ÁN/RU', n: 1, tbp: 'Lê Minh Lai', email: 'Lailm@beelogistics.com' },
            { id: 'KTO', name: 'KẾ TOÁN', n: 1, tbp: 'Trần Thị Quyên', email: 'quyentt@beelogistics.com' },
            { id: 'VTH', name: 'VP THANH HÓA/NGHỆ AN', n: 1, tbp: 'Lê Thị Thuý', email: 'Ltthuy@beelogistics.com' },
            { id: 'VHN', name: 'VP NAM ĐỊNH/HÀ NAM', n: 1, tbp: 'Nguyễn Thị Oanh', email: 'oanhnt@beelogistics.com' },
            { id: 'SAL', name: 'KINH DOANH', n: 0, tbp: 'Trần Văn Minh', email: 'minhtv@beelogistics.com' },
            { id: 'ADM', name: 'VẬN HÀNH - TESTING', n: 0, tbp: 'Bùi Việt Anh', email: 'Jihoon.vnhph@beelogistics.com', adm: true }
        ];

        let cur = null;

        window.onload = () => {
            const s = document.getElementById('selUser');
            DEPS.forEach(d => s.innerHTML += `<option value="${d.tbp}">${d.tbp} (${d.name})</option>`);
            lucide.createIcons();
        };

        async function sendMailOTP() {
            const name = document.getElementById('selUser').value;
            if(!name) return alert('Chọn danh tính cậu ơi!');
            cur = DEPS.find(d => d.tbp === name);
            
            document.getElementById('btnSend').innerText = "Đang gửi mã...";
            const { error } = await sb.auth.signInWithOtp({ email: cur.email });
            
            if(error) {
                alert("Lỗi gửi mail: " + error.message);
                document.getElementById('btnSend').innerText = "Gửi mã vào Mail";
            } else {
                document.getElementById('loginStep1').classList.add('hidden');
                document.getElementById('loginStep2').classList.remove('hidden');
                document.getElementById('msgOTP').innerText = "Mã 6 số đã gửi tới mail: " + cur.email;
            }
        }

        async function verifyOTP() {
            const token = document.getElementById('otp').value;
            const { data, error } = await sb.auth.verifyOtp({ email: cur.email, token, type: 'magiclink' });
            
            if(error) return alert("Mã không đúng rồi!");
            
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('quarterPage').classList.remove('hidden');
            document.getElementById('welcomeUser').innerText = `CHÀO ANH/CHỊ: ${cur.tbp}`;
            lucide.createIcons();
        }

        function enterSystem() {
            cur.quy = document.getElementById('selQuy').value;
            document.getElementById('quarterPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('headerUser').innerText = `${cur.tbp} | ${cur.quy}`;
            // Sau đó render giao diện chính...
        }
    </script>
</body>
</html>
